name: discord-bot-tickers

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  redis:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    logging: *default-logging
    networks:
      app-network:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: server
    build: 
      context: .
      dockerfile: dockerfile.server
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server/logs:/app/logs
    restart: always
    logging: *default-logging
    networks:
      app-network:
        ipv4_address: 172.20.0.3
    # ports:
    #   - "8000:8000"  # Maps host port 8000 to container port 8000

  tickers:
    image: tickers
    build:
      context: .
      dockerfile: dockerfile.tickers
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - UPTIME_HEARTBEAT_URL=${UPTIME_HEARTBEAT_URL}
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_started
    volumes:
      - ./tickers/logs:/app/logs
    restart: always
    logging: *default-logging
    networks:
      app-network:
        ipv4_address: 172.20.0.4

  market-wiz:
    image: market-wiz
    build:
      context: .
      dockerfile: dockerfile.marketwiz
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
    volumes:
      - ./market-wiz/logs:/app/logs
    restart: always
    logging: *default-logging
    platform: linux/amd64
    depends_on:
      redis:
        condition: service_healthy
    networks:
      app-network:
        ipv4_address: 172.20.0.5

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    logging: *default-logging
    profiles:
      - ${ENVIRONMENT:-prod} 
    networks:
      app-network:
        ipv4_address: 172.20.0.6

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

